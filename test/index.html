<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGC管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 h-screen flex text-gray-700 text-sm overflow-hidden">

    <!-- ============ Sidebar ============ -->
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-100 space-x-2">
            <i class="fa-solid fa-laptop-code text-blue-600 text-xl"></i>
            <span class="font-bold text-base text-gray-800">AIGC管理后台</span>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto space-y-1 px-3">
            <div class="nav-item flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 rounded-md" onclick="switchView('dashboard')">
                <i class="fa-solid fa-chart-line w-6 text-gray-400"></i><span>数据大盘</span>
            </div>
            <div class="nav-item flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 rounded-md" onclick="switchView('resource')">
                <i class="fa-solid fa-folder-open w-6 text-gray-400"></i><span>资源中心</span>
            </div>
            <div class="space-y-1">
                <div class="nav-item flex items-center justify-between px-3 py-2.5 text-gray-800 rounded-md bg-gray-50" onclick="switchView('project')">
                    <div class="flex items-center"><i class="fa-solid fa-list-check w-6 text-blue-500"></i><span>项目管理</span></div>
                    <i class="fa-solid fa-chevron-up text-xs text-gray-500"></i>
                </div>
                <div class="pl-9 space-y-1">
                    <div class="nav-item flex items-center py-2 px-3 text-gray-600 hover:text-blue-500 rounded-md" onclick="switchView('topic')"><i class="fa-regular fa-square-check w-5 text-gray-400"></i><span>选题库</span></div>
                    <div class="nav-item flex items-center py-2 px-3 text-gray-600 hover:text-blue-500 rounded-md" onclick="switchView('approval')"><i class="fa-solid fa-file-signature w-5 text-gray-400"></i><span>项目立项</span></div>
                    <div class="nav-item flex items-center py-2 px-3 text-gray-600 hover:text-blue-500 rounded-md" onclick="switchView('task')"><i class="fa-solid fa-circle-chevron-right w-5 text-gray-400"></i><span>任务列表</span></div>
                    <div class="nav-item flex items-center py-2 px-3 text-gray-600 hover:text-blue-500 rounded-md" onclick="switchView('cost')"><i class="fa-regular fa-clock w-5 text-gray-400"></i><span>成本工时管理</span></div>
                </div>
            </div>
            <div class="nav-item flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 rounded-md" onclick="switchView('delivery')">
                <i class="fa-solid fa-box-archive w-6 text-gray-400"></i><span>交付中心</span>
            </div>
            <div class="nav-item flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 rounded-md active" onclick="switchView('filmlibrary')">
                <i class="fa-solid fa-photo-film w-6 text-gray-400"></i><span>成片库</span>
            </div>
            <div class="nav-item flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 rounded-md" onclick="switchView('canvas')">
                <i class="fa-solid fa-palette w-6 text-gray-400"></i><span>画布</span>
            </div>
        </nav>
    </div>

    <!-- ============ Main ============ -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-6 justify-between flex-shrink-0">
            <span class="font-semibold text-gray-800" id="pageTitle">成片库</span>
            <div class="flex items-center space-x-4">
                <i class="fa-regular fa-bell text-lg text-gray-400 hover:text-gray-600 cursor-pointer"></i>
                <div class="flex items-center space-x-2 border-l pl-4">
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">K</div>
                    <span class="font-medium text-gray-700">kuwu</span>
                </div>
            </div>
        </header>

        <div id="mainContent" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div id="view-filmlibrary" class="view-panel active space-y-4">
                <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                        <div class="flex items-center space-x-2"><span class="text-gray-500 whitespace-nowrap">项目ID</span><input type="text" placeholder="请输入项目ID编号" class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs focus:border-blue-500 outline-none"></div>
                        <div class="flex items-center space-x-2"><span class="text-gray-500 whitespace-nowrap">项目名称</span><input type="text" placeholder="请输入项目名称" class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs focus:border-blue-500 outline-none"></div>
                        <div class="flex items-center space-x-2"><span class="text-gray-500 whitespace-nowrap">同步到运营</span><select class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs focus:border-blue-500 outline-none"><option>全部状态</option><option>已同步</option><option>未同步</option></select></div>
                        <div class="flex items-center space-x-2 justify-start md:justify-end">
                            <button class="bg-blue-600 text-white px-5 py-1.5 rounded text-xs hover:bg-blue-700 font-medium">查询</button>
                            <button class="border border-gray-300 text-gray-600 px-5 py-1.5 rounded text-xs hover:bg-gray-50 font-medium bg-white">重置</button>
                        </div>
                    </div>
                    <div class="border-t border-gray-100 pt-3 flex items-center justify-between">
                        <div class="flex items-center space-x-2"><span class="font-bold text-gray-800 text-sm">交付项目列表</span><span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">共 8 项</span></div>
                    </div>
                </div>
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-gray-50 text-gray-500 border-b border-gray-200 text-xs font-semibold uppercase tracking-wider">
                                <th class="py-3 px-4">项目ID</th><th class="py-3 px-4">项目名称</th><th class="py-3 px-4">项目总剧集</th><th class="py-3 px-4">项目分类</th><th class="py-3 px-4">项目状态</th><th class="py-3 px-4">项目截止时间</th><th class="py-3 px-4">同步到运营</th><th class="py-3 px-4 text-center">操作</th>
                            </tr></thead>
                            <tbody class="divide-y divide-gray-100 text-xs" id="filmTableBody"></tbody>
                        </table>
                    </div>
                    <div class="bg-white px-4 py-3.5 border-t border-gray-200 flex items-center justify-between text-xs text-gray-500">
                        <div class="flex items-center space-x-4"><span>共 8 条</span><div class="flex items-center space-x-1 border rounded px-2 py-1 bg-white cursor-pointer hover:border-gray-400"><span>10条/页</span><i class="fa-solid fa-chevron-down text-[10px]"></i></div></div>
                        <div class="flex items-center space-x-1">
                            <button class="w-7 h-7 flex items-center justify-center border rounded bg-gray-50 text-gray-400 cursor-not-allowed"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                            <button class="w-7 h-7 flex items-center justify-center border rounded bg-blue-500 text-white font-semibold">1</button>
                            <button class="w-7 h-7 flex items-center justify-center border rounded bg-gray-50 text-gray-400 cursor-not-allowed"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
                            <span class="ml-4">前往</span><input type="text" value="1" class="w-8 h-7 border rounded text-center focus:border-blue-500 outline-none"><span>页</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="view-canvas-projects" class="view-panel space-y-4">
                <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">选择项目进入画布</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="canvasProjectGrid"></div>
                </div>
            </div>
        </div>

        <div id="workspace-canvas" class="hidden flex-1 flex flex-col min-h-0">
            <!-- 顶部工具栏 -->
            <div id="canvasToolbar" class="px-4 py-2 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center space-x-3">
                    <button onclick="backToCanvasProjects()" class="toolbar-btn"><i class="fa-solid fa-arrow-left mr-1"></i>返回</button>
                    <span class="font-semibold text-sm" id="canvasProjectName" style="color:#e0e0e0"></span>
                </div>
                <div class="flex items-center space-x-2">
                    <button class="toolbar-btn" onclick="CanvasModule.addTextNode()"><i class="fa-solid fa-font mr-1"></i>添加文本</button>
                    <button class="toolbar-btn" onclick="CanvasModule.uploadLocalImage()"><i class="fa-solid fa-upload mr-1"></i>上传图片</button>
                    <button onclick="clearCanvasWorkspace()" class="toolbar-btn"><i class="fa-solid fa-trash-can mr-1"></i>清空</button>
                    <button class="toolbar-btn"><i class="fa-solid fa-download mr-1"></i>导出</button>
                </div>
            </div>
            <!-- 主体 -->
            <div class="flex flex-1 overflow-hidden min-h-0">
                <!-- 左侧面板 -->
                <div id="canvasLeftPanel" class="w-64 flex flex-col flex-shrink-0 overflow-y-auto">
                    <div class="p-4 space-y-4">
                        <div>
                            <div class="panel-label">基础模型</div>
                            <select id="canvasModel" class="w-full py-2 px-3">
                                <option>LibNano (推荐)</option><option>Seedream 5.0</option><option>Midjourney V7</option><option>Niji 7</option><option>Z Image</option><option>Qwen Image</option>
                            </select>
                        </div>
                        <div>
                            <div class="panel-label">正面提示词</div>
                            <textarea id="promptPositive" rows="4" placeholder="描述你想要的画面内容&#10;例如：古风宫廷场景，一位身着华服的皇帝端坐于龙椅之上，金色光线从窗棂洒入，电影级光影，8K画质"></textarea>
                        </div>
                        <div>
                            <div class="panel-label">负面提示词</div>
                            <textarea id="promptNegative" rows="2" placeholder="模糊、变形、低画质、水印、多手多脚"></textarea>
                        </div>
                        <div>
                            <div class="panel-label">图片尺寸</div>
                            <div class="grid grid-cols-2 gap-1.5">
                                <button onclick="setCanvasSize(this,'512×512')" class="size-btn">512×512</button>
                                <button onclick="setCanvasSize(this,'768×768')" class="size-btn">768×768</button>
                                <button onclick="setCanvasSize(this,'1024×1024')" class="size-btn active">1024×1024</button>
                                <button onclick="setCanvasSize(this,'768×512')" class="size-btn">768×512</button>
                                <button onclick="setCanvasSize(this,'512×768')" class="size-btn">512×768</button>
                            </div>
                        </div>
                        <div>
                            <div class="panel-label">风格</div>
                            <div class="flex flex-wrap gap-1.5">
                                <button onclick="setCanvasStyle(this,'写实')" class="style-btn active">写实</button>
                                <button onclick="setCanvasStyle(this,'动漫')" class="style-btn">动漫</button>
                                <button onclick="setCanvasStyle(this,'油画')" class="style-btn">油画</button>
                                <button onclick="setCanvasStyle(this,'水彩')" class="style-btn">水彩</button>
                                <button onclick="setCanvasStyle(this,'素描')" class="style-btn">素描</button>
                                <button onclick="setCanvasStyle(this,'3D渲染')" class="style-btn">3D渲染</button>
                            </div>
                        </div>
                        <button onclick="generateCanvasImage()" class="gen-btn w-full">
                            <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>生成
                        </button>
                        <div class="border-t border-[#333] pt-3">
                            <div class="panel-label">快捷工具</div>
                            <div class="flex flex-wrap gap-1.5">
                                <button class="quick-btn">/ 分镜9宫格</button>
                                <button class="quick-btn">/ 连续分镜</button>
                                <button class="quick-btn">/ 剧情演进</button>
                                <button class="quick-btn">/ 三视图</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 中央画布 -->
                <div class="flex-1 flex flex-col min-w-0 min-h-0">
                    <div class="px-3 py-1.5 flex items-center justify-between flex-shrink-0" style="font-size:10px;color:#666;background:#1c1c1c;border-bottom:1px solid #2a2a2a;">
                        <span>右键画布添加节点 | 拖拽节点卡片移动位置 | 滚轮缩放</span>
                        <span id="canvasCoord">X:0 Y:0</span>
                    </div>
                    <div id="canvasWorkspace" class="flex-1 overflow-auto relative min-h-0">
                        <div id="canvasContent" class="relative" style="min-width:100%;min-height:100%;padding:40px;">
                            <div id="canvasEmpty" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div class="text-center" style="color:#555">
                                    <i class="fa-solid fa-panorama text-5xl mb-3 block"></i>
                                    <p class="text-sm">右键画布添加节点 | 左侧输入提示词生成图片</p>
                                </div>
                            </div>
                            <div id="canvasCardsArea"></div>
                        </div>
                    </div>
                    <!-- 底部历史 -->
                    <div id="historyBar" class="flex-shrink-0">
                        <div class="flex items-center px-3 py-2 border-b border-[#2a2a2a]" style="font-size:10px;color:#888;">
                            <i class="fa-solid fa-clock-rotate-left mr-1"></i>生成历史
                            <span class="ml-auto" id="historyCount">0 张</span>
                        </div>
                        <div id="generateHistory" class="flex px-3 py-2 gap-2 overflow-x-auto" style="max-height:60px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/views.js"></script>
    <script src="js/filmLibrary.js"></script>
    <script src="js/canvas.js"></script>
    <script>
        FilmLibrary.render();
        CanvasModule.renderProjectList();
        CanvasModule.initCanvasEvents();
        window.enterCanvasProject = CanvasModule.enterProject;
    </script>
</body>
</html>
